<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Acesso Suspenso | MyFleetCar</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    <style>
        body { font-family: 'Outfit', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen flex items-center justify-center p-6">
    <div class="max-w-md w-full text-center">
        <div class="mb-8 flex justify-center">
            <div class="w-24 h-24 bg-red-100 text-red-600 rounded-full flex items-center justify-center animate-bounce">
                <span class="material-symbols-outlined text-5xl">lock</span>
            </div>
        </div>

        <h1 class="text-3xl font-black tracking-tight mb-4 text-slate-950">Acesso Suspenso</h1>
        <p class="text-slate-600 mb-10 leading-relaxed">
            Identificamos uma pendência na sua subscrição ou o seu período de teste expirou. Para continuar utilizando o <strong>MyFleetCar</strong> e gerenciar sua oficina, entre em contato com nosso suporte.
        </p>

        <div class="space-y-4">
            <a href="https://wa.me/5524992716045?text=Olá, meu acesso ao MyFleetCar foi suspenso. Gostaria de regularizar." 
                class="block w-full bg-slate-950 text-white font-black py-4 rounded-2xl hover:bg-orange-600 transition-all shadow-xl shadow-slate-950/10 flex items-center justify-center gap-3">
                <span class="material-symbols-outlined text-lg">message</span>
                FALAR COM O SUPORTE
            </a>
            
            <button onclick="window.location.href='login.html'" 
                class="w-full text-slate-500 font-bold py-2 hover:text-slate-800 transition-all uppercase text-[10px] tracking-widest">
                Tentar Logar Novamente
            </button>
        </div>

        <div class="mt-16 border-t border-slate-200 pt-8">
            <img src="img/mainlogohorizontalfull-myfleetcar.png" alt="MyFleetCar Logo" class="h-6 mx-auto opacity-30 grayscale">
        </div>
    </div>
</body>
</html>
