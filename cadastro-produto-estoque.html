<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Novo Produto - MyCarFleet</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        primary: "#a04100",
                        "primary-container": "#ff6b00",
                        "on-surface": "#131b2e",
                        "surface-container-low": "#f2f3ff",
                        "surface-container-lowest": "#ffffff"
                    }
                }
            }
        }
    </script>
    <script>
        // Use logic from inventory.js
    </script>
    <style>
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-[#faf8ff] text-on-surface">
    <aside class="h-screen w-64 fixed left-0 top-0 -translate-x-full lg:translate-x-0 transition-transform duration-300 z-[100] sidebar-mobile bg-slate-50 dark:bg-slate-900 flex flex-col py-6 space-y-2 z-50 overflow-y-auto border-r border-orange-100/15">
        <div class="px-6 mb-8">
            <img src="img/mainlogohorizontalfull-myfleetcar.png" alt="MyFleetCar Logo" class="h-10 w-auto mb-2">
            <p class="text-[10px] uppercase tracking-widest text-slate-500 font-bold">Mechanical Excellence</p>
        </div>
        <nav class="flex-1 px-4 space-y-1">
            <a class="flex items-center space-x-3 px-4 py-3 rounded-xl text-slate-600 hover:text-orange-500 transition-all" href="home.html">
                <span class="material-symbols-outlined">home</span>
                <span class="text-sm">Home</span>
            </a>
            <a class="flex items-center space-x-3 px-4 py-3 rounded-xl text-orange-600 border-r-4 border-orange-600 bg-orange-50/50 font-bold" href="lista-estoque.html">
                <span class="material-symbols-outlined">inventory_2</span>
                <span class="text-sm font-bold">Estoque</span>
            </a>
        </nav>
    </aside>

    <header class="fixed top-0 right-0 w-full lg:w-[calc(100%-16rem)] z-40 bg-white/80 backdrop-blur-md border-b border-orange-100/15 shadow-sm">
        <div class="flex justify-between items-center px-8 h-16 w-full">
            <h2 class="text-sm font-black text-on-surface uppercase tracking-tight">Estoque > Novo Registro</h2>
        </div>
        <nav class="flex px-8 border-t border-orange-100/5 overflow-x-auto no-scrollbar whitespace-nowrap">
            <a href="lista-estoque.html" class="px-4 py-3 text-xs font-medium text-slate-500 hover:text-primary transition-colors">Lista de Itens</a>
            <a href="movimentacao-estoque.html" class="px-4 py-3 text-xs font-medium text-slate-500 hover:text-primary transition-colors">Histórico de Movimentação</a>
            <a href="cadastro-produto-estoque.html" class="px-4 py-3 text-xs font-bold border-b-2 border-primary text-primary">Novo Produto</a>
            <a href="configuracoes-estoque.html" class="px-4 py-3 text-xs font-medium text-slate-500 hover:text-primary transition-colors">Cadastros Auxiliares</a>
        </nav>
    </header>

    <main style="padding-top: 130px !important;" class="lg:ml-64 p-8 min-h-screen">
        <div class="max-w-4xl mx-auto">
            <div class="bg-white rounded-3xl shadow-sm border border-slate-100 overflow-hidden">
                <div class="px-8 py-6 bg-slate-50/50 border-b border-slate-100">
                    <h3 class="text-xl font-black text-on-surface">Dados do Produto</h3>
                    <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Preencha as informações para registro no estoque</p>
                </div>

                <form id="product-form" class="p-8 space-y-6">
                    <!-- Row 1: Name and Brand -->
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                        <div class="md:col-span-2 space-y-2">
                            <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Nome do Produto*</label>
                            <input type="text" id="prod-name" required placeholder="Ex: Pastilha de Freio Dianteira" 
                                class="w-full bg-slate-50 border-none rounded-xl py-3 px-4 text-sm font-bold focus:ring-2 focus:ring-primary/20 transition-all">
                        </div>
                        <div class="space-y-2">
                            <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Marca do Produto*</label>
                            <input type="text" id="prod-brand" required placeholder="Ex: Bosch, COBREQ" 
                                class="w-full bg-slate-50 border-none rounded-xl py-3 px-4 text-sm font-bold focus:ring-2 focus:ring-primary/20 transition-all">
                        </div>
                    </div>

                    <!-- Row 2: Codes -->
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                        <div class="space-y-2">
                            <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Cod Referência*</label>
                            <input type="text" id="prod-ref" required placeholder="Ex: 0204.01" 
                                class="w-full bg-slate-50 border-none rounded-xl py-3 px-4 text-sm font-bold focus:ring-2 focus:ring-primary/20 transition-all">
                        </div>
                        <div class="space-y-2">
                            <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Código de Barras</label>
                            <div class="relative">
                                <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 text-sm">barcode_scanner</span>
                                <input type="text" id="prod-barcode" placeholder="Ex: 7890..." 
                                    class="w-full bg-slate-50 border-none rounded-xl py-3 pl-10 pr-4 text-sm font-bold focus:ring-2 focus:ring-primary/20 transition-all">
                            </div>
                        </div>
                        <div class="space-y-2">
                            <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Código Interno</label>
                            <div class="flex gap-2">
                                <input type="text" id="prod-sku" placeholder="Gere automático..." 
                                    class="flex-1 bg-slate-50 border-none rounded-xl py-3 px-4 text-sm font-bold focus:ring-2 focus:ring-primary/20 transition-all">
                                <button type="button" onclick="generateInternalCode()" class="bg-slate-100 p-3 rounded-xl hover:bg-slate-200 transition-all">
                                    <span class="material-symbols-outlined text-sm">autorenew</span>
                                </button>
                            </div>
                        </div>
                    </div>

                    <!-- Row 3: Auxiliary Selections -->
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                        <div class="space-y-2">
                            <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Unidade de Medida*</label>
                            <div class="flex gap-2">
                                <select id="prod-unit" required class="flex-1 bg-slate-50 border-none rounded-xl py-3 px-4 text-sm font-bold focus:ring-2 focus:ring-primary/20 transition-all">
                                    <option value="">Carregando...</option>
                                </select>
                                <button type="button" onclick="quickAddAux('prod-unit')" class="bg-orange-50 text-primary p-3 rounded-xl hover:bg-primary hover:text-white transition-all flex items-center justify-center border border-orange-100">
                                    <span class="material-symbols-outlined text-sm">add</span>
                                </button>
                            </div>
                        </div>
                        <div class="space-y-2">
                            <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Categoria*</label>
                            <div class="flex gap-2">
                                <select id="prod-category" required class="flex-1 bg-slate-50 border-none rounded-xl py-3 px-4 text-sm font-bold focus:ring-2 focus:ring-primary/20 transition-all">
                                    <option value="">Carregando...</option>
                                </select>
                                <button type="button" onclick="quickAddAux('prod-category')" class="bg-orange-50 text-primary p-3 rounded-xl hover:bg-primary hover:text-white transition-all flex items-center justify-center border border-orange-100">
                                    <span class="material-symbols-outlined text-sm">add</span>
                                </button>
                            </div>
                        </div>
                        <div class="space-y-2 md:col-span-1">
                            <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Aplicação (Veículos)*</label>
                            <div class="flex gap-2">
                                <select id="prod-vehicles" class="flex-1 bg-slate-50 border-none rounded-xl py-3 px-4 text-sm font-bold focus:ring-2 focus:ring-primary/20 transition-all">
                                    <option value="">Adicionar veículo...</option>
                                </select>
                                <button type="button" onclick="quickAddAux('prod-vehicles')" class="bg-orange-50 text-primary p-3 rounded-xl hover:bg-primary hover:text-white transition-all flex items-center justify-center border border-orange-100">
                                    <span class="material-symbols-outlined text-sm">add</span>
                                </button>
                            </div>
                            <!-- Tags Container -->
                            <div id="selected-vehicles-tags" class="flex flex-wrap gap-2 pt-2">
                                <!-- Tags dynamically added here -->
                            </div>
                        </div>
                    </div>

                    <!-- Description -->
                    <div class="space-y-2">
                        <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Descrição Detalhada</label>
                        <textarea id="prod-description" rows="2" placeholder="Observações técnicas..." 
                            class="w-full bg-slate-50 border-none rounded-xl py-3 px-4 text-sm font-bold focus:ring-2 focus:ring-primary/20 transition-all"></textarea>
                    </div>

                    <!-- Stock and Finance -->
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-8 pt-4 border-t border-slate-50">
                        <div class="grid grid-cols-2 gap-4">
                            <div class="space-y-2">
                                <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Estoque Atual*</label>
                                <input type="number" id="prod-qty" required min="0" value="0"
                                    class="w-full bg-slate-50 border-none rounded-xl py-3 px-4 text-sm font-bold focus:ring-2 focus:ring-primary/20 transition-all">
                            </div>
                            <div class="space-y-2">
                                <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Estoque Mínimo*</label>
                                <input type="number" id="prod-min-qty" required min="1" value="5"
                                    class="w-full bg-slate-50 border-none rounded-xl py-3 px-4 text-sm font-bold focus:ring-2 focus:ring-primary/20 transition-all text-red-500">
                            </div>
                        </div>
                        <div class="grid grid-cols-2 gap-4">
                            <div class="space-y-2">
                                <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Valor Custo*</label>
                                <div class="relative">
                                    <span class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 font-bold text-xs">R$</span>
                                    <input type="text" id="prod-buy-price" required placeholder="0,00" 
                                        class="w-full bg-slate-50 border-none rounded-xl py-3 pl-10 pr-4 text-sm font-bold focus:ring-2 focus:ring-primary/20 transition-all">
                                </div>
                            </div>
                            <div class="space-y-2">
                                <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-1">Valor Venda*</label>
                                <div class="relative">
                                    <span class="absolute left-4 top-1/2 -translate-y-1/2 text-primary font-bold text-xs">R$</span>
                                    <input type="text" id="prod-sell-price" required placeholder="0,00" 
                                        class="w-full bg-slate-50 border-none rounded-xl py-3 pl-10 pr-4 text-sm font-bold focus:ring-2 focus:ring-primary/20 transition-all text-on-surface">
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Actions -->
                    <div class="pt-6 flex gap-4">
                        <button type="button" onclick="history.back()" class="flex-1 py-4 bg-slate-100 text-slate-600 font-black uppercase tracking-widest rounded-2xl hover:bg-slate-200 transition-all active:scale-95">
                            Cancelar
                        </button>
                        <button type="submit" class="flex-[2] py-4 bg-primary text-white font-black uppercase tracking-widest rounded-2xl hover:bg-primary-container transition-all shadow-xl shadow-primary/20 active:scale-95">
                            Salvar Produto
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>
    <script src="auth.js"></script>
    <script src="navigation.js"></script>
    <script src="inventory.js"></script>
</body>
</html>
